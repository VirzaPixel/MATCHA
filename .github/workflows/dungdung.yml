name: GO GREEENNNNNn

on:
  schedule:
    # Runs once a day at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual trigger

jobs:
  auto_push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Sequential Pushes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          for i in {1..8}
          do
            echo "Push number $i at $(date)" > last_update.txt
            git add last_update.txt
            git commit -m "GOO GREENNNNN $i/8 at $(date)"
            git push
            # Optional: sleep for a few seconds to ensure distinct timestamps
            sleep 2
          done
